<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>美容サロン | 渋谷の人気サロン</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; color: #333; }
    .hero {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 100px 20px;
    }
    .hero h1 { font-size: 48px; margin-bottom: 20px; }
    .hero p { font-size: 20px; margin-bottom: 40px; }
    .btn {
      background: white;
      color: #667eea;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 18px;
      text-decoration: none;
      font-weight: bold;
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 60px 20px;
      flex-wrap: wrap;
    }
    .feature-card {
      text-align: center;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 250px;
    }
    .feature-card h3 { margin: 15px 0 10px; font-size: 22px; }
    .icon { font-size: 50px; }
    .cta {
      background: #667eea;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }
    .cta h2 { font-size: 36px; margin-bottom: 20px; }
    .cta .btn { background: white; color: #667eea; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>✨ あなたの美しさを引き出す</h1>
    <p>渋谷の人気美容サロン｜初回限定50%OFF</p>
    <a class="btn" href="#">今すぐ予約する</a>
  </div>
  <div class="features">
    <div class="feature-card">
      <div class="icon">💆</div>
      <h3>トリートメント</h3>
      <p>最高級の素材で髪をケア</p>
    </div>
    <div class="feature-card">
      <div class="icon">✂️</div>
      <h3>カット</h3>
      <p>あなたに似合うスタイルに</p>
    </div>
    <div class="feature-card">
      <div class="icon">🎨</div>
      <h3>カラー</h3>
      <p>トレンドカラーを取り入れる</p>
    </div>
  </div>
  <div class="cta">
    <h2>初回限定！50%OFFキャンペーン中</h2>
    <p style="margin-bottom:30px">今月末まで。お早めにご予約ください。</p>
    <a class="btn" href="#">無料カウンセリングを予約</a>
  </div>
</body>
</html>
