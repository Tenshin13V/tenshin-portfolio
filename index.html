<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>展紳のプロフィール</title>
  <style>
    body {
      background-color: #1a1a2e;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 60px;
      margin: 0;
    }
    h1 {
      font-size: 48px;
      color: #00d4ff;
    }
    p {
      font-size: 18px;
      color: #cccccc;
    }
    .button {
      background-color: #00d4ff;
      color: black;
      padding: 12px 30px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
      text-decoration: none;
      display: inline-block;
    }
    .skills {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .skill-card {
      background-color: #16213e;
      border: 1px solid #00d4ff;
      border-radius: 15px;
      padding: 20px 30px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>👋 こんにちは、展紳です！</h1>
  <p>18歳 | セブ島・マレーシア留学予定</p>
  <p>Webサイト・アプリを作る事業を目指しています</p>

  <div class="skills">
    <div class="skill-card">💻 HTML</div>
    <div class="skill-card">🎨 CSS</div>
    <div class="skill-card">⚡ JavaScript（学習中）</div>
  </div>

  <br><br>
  <a class="button" href="#">お問い合わせ</a>
  <a class="button" href="#">作品一覧</a>
</body><script>
  document.querySelector('.button').addEventListener('click', function() {
    alert('お問い合わせありがとうございます！\n後ほどご連絡します😊');
  });
</script>
</html>
